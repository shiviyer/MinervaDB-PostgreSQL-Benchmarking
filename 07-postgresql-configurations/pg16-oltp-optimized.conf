# =============================================================================
# MinervaDB PostgreSQL Benchmarking Toolkit
# pg16-oltp-optimized.conf - PostgreSQL 16 OLTP Performance Configuration
# =============================================================================
# Target: High-throughput OLTP workloads (web, fintech, SaaS)
# Hardware: 32 CPU cores, 128 GB RAM, NVMe SSD storage
# Use Case: Benchmarking & production OLTP deployments
#
# INSTRUCTIONS:
#   1. Adjust memory settings to your server RAM
#   2. Adjust cpu settings to your core count
#   3. Copy to /etc/postgresql/16/main/postgresql.conf
#   4. Reload: SELECT pg_reload_conf(); (or restart for some params)
#
# Parameter Categories:
#   [MEMORY] - Memory management
#   [WAL]    - Write-Ahead Logging
#   [QUERY]  - Query planner & executor
#   [CONN]   - Connection management
#   [MAINT]  - Maintenance & autovacuum
#   [LOG]    - Logging for benchmarks
# =============================================================================

# =============================================================================
# [MEMORY] Memory Configuration
# Scale these values to your server RAM
# Rule: shared_buffers = 25% RAM, effective_cache_size = 75% RAM
# =============================================================================

# Primary data buffer (25% of RAM)
# For 128GB RAM: 32GB
shared_buffers = '32GB'

# Planner's estimate of available OS cache
# For 128GB RAM: 96GB
effective_cache_size = '96GB'

# Per-sort/hash operation memory
# OLTP: Keep lower (4-16MB), complex queries may need more
work_mem = '8MB'

# For VACUUM, CREATE INDEX, ALTER TABLE
maintenance_work_mem = '2GB'

# Autovacuum worker memory  
autovacuum_work_mem = '1GB'

# Huge pages (requires OS-level huge pages configured)
# Recommended: 'on' for production
huge_pages = 'try'

# =============================================================================
# [WAL] Write-Ahead Log Configuration
# =============================================================================

# WAL buffer in memory (typically 16MB-64MB for OLTP)
wal_buffers = '64MB'

# WAL compression (pg 15+) - reduces WAL size, slight CPU cost
wal_compression = 'lz4'

# Synchronous commit: on = safest, off = fastest (risk: last WAL on crash)
# For benchmarking: 'off' to measure peak throughput
# For production OLTP: 'on'
synchronous_commit = 'on'

# fsync: must be 'on' for production data safety
fsync = 'on'

# full_page_writes: required with fsync=on
full_page_writes = 'on'

# Checkpoint settings
checkpoint_timeout = '15min'
checkpoint_completion_target = '0.9'
max_wal_size = '8GB'
min_wal_size = '1GB'

# WAL level (logical required for logical replication)
wal_level = 'replica'

# =============================================================================
# [QUERY] Query Planner Configuration
# =============================================================================

# For NVMe SSD - set low for index scans
random_page_cost = '1.1'

# For SSD - sequential read cost
seq_page_cost = '1.0'

# For NVMe: effective_io_concurrency = 200-300
# For HDD: 2-4
effective_io_concurrency = '200'

# Parallel query settings
max_parallel_workers_per_gather = '4'
max_parallel_workers = '16'
max_parallel_maintenance_workers = '4'
parallel_tuple_cost = '0.1'
parallel_setup_cost = '1000'

# JIT compilation (disable for OLTP, enable for OLAP)
jit = 'off'

# Statistics target for query planner
default_statistics_target = '200'

# =============================================================================
# [CONN] Connection Management
# =============================================================================

# Maximum connections
# Note: Use PgBouncer in front for high connection workloads
max_connections = '500'

# Superuser reserved connections
superuser_reserved_connections = '5'

# =============================================================================
# [MAINT] Autovacuum Configuration
# Tuned for OLTP with high write rate
# =============================================================================

autovacuum = 'on'
autovacuum_max_workers = '6'
autovacuum_naptime = '30s'

# Vacuum cost settings (prevent vacuum from hogging I/O)
autovacuum_vacuum_cost_delay = '2ms'
autovacuum_vacuum_cost_limit = '400'

# Thresholds (scale for large tables)
autovacuum_vacuum_scale_factor = '0.02'          # 2% of table
autovacuum_analyze_scale_factor = '0.01'         # 1% of table
autovacuum_vacuum_threshold = '100'
autovacuum_analyze_threshold = '50'

# Vacuum for transaction ID wraparound
autovacuum_freeze_max_age = '200000000'
autovacuum_multixact_freeze_max_age = '400000000'

# =============================================================================
# [BGWRITER] Background Writer
# =============================================================================

bgwriter_delay = '50ms'
bgwriter_lru_maxpages = '200'
bgwriter_lru_multiplier = '4.0'

# =============================================================================
# [LOCK] Lock Management
# =============================================================================

deadlock_timeout = '1s'
lock_timeout = '30s'
statement_timeout = '0'          # Disable for benchmarks; set for prod

# =============================================================================
# [REPLICATION] Replication (if needed)
# =============================================================================

max_replication_slots = '10'
max_wal_senders = '10'
hot_standby = 'on'
hot_standby_feedback = 'on'

# =============================================================================
# [LOG] Logging for Benchmarking
# =============================================================================

# Log slow queries during benchmarks
log_min_duration_statement = '1000'    # Log queries > 1 second
log_checkpoints = 'on'
log_connections = 'off'               # Disable for high-connection benchmarks
log_disconnections = 'off'
log_lock_waits = 'on'
log_temp_files = '0'                  # Log all temp files (0 = all)
log_autovacuum_min_duration = '250ms'

# Log format
log_destination = 'stderr'
logging_collector = 'on'
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = '1d'
log_rotation_size = '100MB'
log_line_prefix = '%m [%p] %q%u@%d '

# =============================================================================
# [MISC] Miscellaneous
# =============================================================================

# Timezone
timezone = 'UTC'
log_timezone = 'UTC'

# Locale
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.english'

# =============================================================================
# [PG16-SPECIFIC] PostgreSQL 16 New Features
# =============================================================================

# Logical replication improvements (PG16)
logical_decoding_work_mem = '64MB'

# pg_stat_io improvements (PG16) - no config needed, auto-collected

# Parallel vacuuming (PG16)
# No direct config - enabled by maintenance_work_mem and max_parallel_maintenance_workers

# =============================================================================
# Benchmark-Specific Overrides
# Comment these out for production use
# =============================================================================

# BENCHMARK ONLY: Disable synchronous_commit for max throughput testing
# synchronous_commit = 'off'

# BENCHMARK ONLY: Disable fsync for absolute max throughput (DANGEROUS)
# fsync = 'off'
# full_page_writes = 'off'
